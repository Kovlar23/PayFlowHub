name: payflow-hub-course-baseline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify course baseline files
        run: |
          test -f PetProject/README.md
          test -f PetProject/docs/course-roadmap.md
          test -f PetProject/docs/modules/00-fintech-foundations.md
          test -f PetProject/docs/modules/01-system-vision.md
