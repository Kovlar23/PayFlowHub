name: payflow-hub-ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./PetProject

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore PayFlowHub.sln

      - name: Build
        run: dotnet build PayFlowHub.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test PayFlowHub.sln --configuration Release --no-build
